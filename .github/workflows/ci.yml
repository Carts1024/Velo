name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-js:
    name: Frontend, Packages & Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Typecheck
        run: pnpm lint:fix

      - name: Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test

  test-rust:
    name: Smart Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Run Cargo Tests
        run: cargo test --manifest-path contracts/registry/Cargo.toml

  deploy-convex:
    name: Deploy Convex Backend
    needs: test-js
    if: github.ref == 'refs/heads/main' && secrets.CONVEX_DEPLOY_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm --filter @repo/backend convex deploy --cmd 'pnpm build'

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [test-js, deploy-convex]
    # Run even if deploy-convex is skipped because it's not configured
    if: always() && github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != '' && (needs.deploy-convex.result == 'success' || needs.deploy-convex.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-contracts:
    name: Deploy Smart Contracts
    needs: test-rust
    if: github.ref == 'refs/heads/main' && (secrets.STELLAR_SECRET_KEY != '' || github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Contracts
        run: stellar contract build --manifest-path contracts/registry/Cargo.toml

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-contract-wasm
          path: contracts/registry/target/wasm32v1-none/release/talakit_registry.wasm

      - name: Deploy to Testnet
        if: secrets.STELLAR_SECRET_KEY != ''
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          stellar network add --rpc-url https://soroban-testnet.stellar.org --network-passphrase "Test SDF Network ; September 2015" testnet
          stellar keys add deployer --secret-key "$STELLAR_SECRET_KEY"
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/registry/target/wasm32v1-none/release/talakit_registry.wasm \
            --source deployer \
            --network testnet)
          echo "Deployed Contract ID: $CONTRACT_ID"
