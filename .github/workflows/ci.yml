name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-js:
    name: Frontend, Packages & Backend Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: https://dummy.convex.cloud
      NEXT_PUBLIC_VELO_REGISTRY_CONTRACT_ID: CBSR5LFHR5Q2X3PO3HSMGXI43YEUYGFTHUPGNVGW6XH2VNOQUEUHIEJR
      NEXT_PUBLIC_VELO_PAY_ACCESS_CONTRACT_ID: CBHDLZYSYWETHPC6KDGH35S4SNBU5P7QWLNNDWYXJRHZMZDTQSKYVOXJ
      VELO_REQUIRE_CONTRACT_IDS: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Typecheck
        run: pnpm lint:fix

      - name: Build
        run: pnpm build

      - name: Run Tests
        run: pnpm test

      - name: Benchmark Harness Smoke Test
        run: pnpm benchmark:smoke

  test-rust:
    name: Smart Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none

      - name: Run Cargo Tests
        run: cargo test --manifest-path contracts/registry/Cargo.toml

  deploy-convex:
    name: Deploy Convex Backend
    needs: test-js
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      HAS_CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY != '' }}
    steps:
      - name: Checkout Code
        if: env.HAS_CONVEX_DEPLOY_KEY == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: env.HAS_CONVEX_DEPLOY_KEY == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        if: env.HAS_CONVEX_DEPLOY_KEY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        if: env.HAS_CONVEX_DEPLOY_KEY == 'true'
        run: pnpm install --frozen-lockfile

      - name: Deploy Convex
        if: env.HAS_CONVEX_DEPLOY_KEY == 'true'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm --filter @repo/backend exec convex deploy --typecheck enable --codegen enable

      - name: Skip Convex Deploy
        if: env.HAS_CONVEX_DEPLOY_KEY != 'true'
        run: echo "CONVEX_DEPLOY_KEY is not configured; skipping Convex deploy."

  deploy-contracts:
    name: Deploy Smart Contracts
    needs: test-rust
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      HAS_STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY != '' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Contracts
        run: stellar contract build --manifest-path contracts/registry/Cargo.toml

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-contract-wasm
          path: contracts/registry/target/wasm32v1-none/release/velo_registry.wasm

      - name: Deploy to Testnet
        if: env.HAS_STELLAR_SECRET_KEY == 'true'
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          stellar network add --rpc-url https://soroban-testnet.stellar.org --network-passphrase "Test SDF Network ; September 2015" testnet
          stellar keys add deployer --secret-key "$STELLAR_SECRET_KEY"
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/registry/target/wasm32v1-none/release/velo_registry.wasm \
            --source deployer \
            --network testnet)
          echo "Deployed Contract ID: $CONTRACT_ID"

      - name: Skip Testnet Deploy
        if: env.HAS_STELLAR_SECRET_KEY != 'true'
        run: echo "STELLAR_SECRET_KEY is not configured; skipping testnet deploy."
